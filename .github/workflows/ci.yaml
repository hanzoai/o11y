name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: hanzo-build-linux-amd64
    env:
      GOPRIVATE: github.com/hanzoai/*
      GOSUMDB: "off"
    steps:
      - name: Checkout o11y
        uses: actions/checkout@v4
        with:
          path: o11y

      # go.mod pins `replace github.com/hanzoai/cloud => ../cloud` for local
      # co-development, so CI supplies the sibling. Pin the exact commit o11y's
      # module graph is reconciled against (readonly `go build ./...` is green
      # against it) — cloud's `main` drifts independently and would break the
      # readonly graph. Bump this when o11y's go.mod is re-tidied against cloud.
      - name: Checkout hanzoai/cloud (sibling for replace => ../cloud)
        uses: actions/checkout@v4
        with:
          repository: hanzoai/cloud
          ref: 884bdebd2d73880421028b67a1ef337aedc0e06f
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          path: cloud

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: o11y/go.mod
          cache-dependency-path: o11y/go.sum

      # Private cross-repo modules (hanzoai/*: commerce, iam, kms, licensing, …
      # pulled transitively via cloud) are fetched over HTTPS git with the org PAT.
      - name: Configure git auth for private hanzoai modules
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: go build
        working-directory: o11y
        run: go build ./...

      # TestEmailRejected asserts an emersion/go-smtp v0.24.0 error string that
      # upstream (wholesale-synced O11y) formats with quotes; skip only it.
      - name: go test
        working-directory: o11y
        run: go test -count=1 -skip '^TestEmailRejected$' ./...
