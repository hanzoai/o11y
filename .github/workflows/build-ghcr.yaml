name: Build & Push to GHCR

on:
  push:
    branches: [main, rebrand/hanzo-o11y]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_ENTERPRISE: hanzoai/o11y
  IMAGE_NAME_COMMUNITY: hanzoai/o11y-community

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        working-directory: frontend
        run: |
          yarn install --frozen-lockfile
          yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  build-and-push:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant: [enterprise, community]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build Go binary
        run: |
          VERSION=$(git describe --tags --always)
          HASH=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          LDFLAGS="-X github.com/hanzoai/o11y/pkg/version.version=$VERSION"
          LDFLAGS="$LDFLAGS -X github.com/hanzoai/o11y/pkg/version.hash=$HASH"
          LDFLAGS="$LDFLAGS -X github.com/hanzoai/o11y/pkg/version.time=$TIMESTAMP"
          LDFLAGS="$LDFLAGS -X github.com/hanzoai/o11y/pkg/version.branch=$BRANCH"
          LDFLAGS="$LDFLAGS -X github.com/hanzoai/o11y/pkg/version.variant=${{ matrix.variant }}"
          mkdir -p target/linux-amd64
          if [ "${{ matrix.variant }}" = "community" ]; then
            BINARY_NAME="o11y-community"
          else
            BINARY_NAME="signoz"
          fi
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o target/linux-amd64/$BINARY_NAME ./cmd/${{ matrix.variant }}/
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image name
        id: image
        run: |
          if [ "${{ matrix.variant }}" = "enterprise" ]; then
            echo "name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ENTERPRISE }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_COMMUNITY }}" >> $GITHUB_OUTPUT
          fi
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/${{ matrix.variant }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OS=linux
            TARGETARCH=amd64
