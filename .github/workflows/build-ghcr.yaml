name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, test, dev]
    tags: [v*]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/o11y
      platforms: linux/amd64
      # Frontend (Dockerfile stage 1) + Go binary (stage 2) build inside the
      # Dockerfile — stage 2 mounts the reusable workflow's `netrc` build secret
      # (from the org GH_PAT) to auth the private github.com/hanzoai/cloud fetch.
      # No sibling ../cloud checkout is needed; cloud is a pinned, authed module.
      # Version metadata is passed as build-args because .git is dockerignored,
      # so the Dockerfile cannot derive it from the repo.
      build-args: |
        VERSION=${{ github.ref_name }}
        COMMIT_HASH=${{ github.sha }}
        BRANCH=${{ github.ref_name }}
    secrets: inherit
