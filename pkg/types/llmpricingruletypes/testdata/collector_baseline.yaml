receivers:
  otlp:
    protocols:
      grpc:
processors:
  o11yllmpricing:
    attrs:
      model: gen_ai.request.model
      in: gen_ai.usage.input_tokens
      out: gen_ai.usage.output_tokens
      cache_read: gen_ai.usage.cache_read.input_tokens
      cache_write: gen_ai.usage.cache_creation.input_tokens
    default_pricing:
      rules: []
    output_attrs:
      in: _o11y.gen_ai.cost_input
      out: _o11y.gen_ai.cost_output
      cache_read: _o11y.gen_ai.cost_cache_read
      cache_write: _o11y.gen_ai.cost_cache_write
      total: _o11y.gen_ai.total_cost
  batch: {}
exporters:
  otlp:
    endpoint: localhost:4317
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, o11yllmpricing]
      exporters: [otlp]
